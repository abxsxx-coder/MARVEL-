<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القيادة العليا | القوات المسلحة - MARVEL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-color: #ff0000; /* أحمر عسكري */
            --glow: #ff4d4d;
            --bg-dark: #020202;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* خلفية الفيديو أو الصورة السينمائية */
        .video-bg {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: brightness(0.3) contrast(1.2);
            background: url('https://images.unsplash.com/photo-1579546671307-b3f85e1bb900?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
        }

        /* تأثير الشبكة الرقمية فوق الخلفية */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0), rgba(0, 0, 255, 0.05));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 0;
        }

        .main-frame {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 20px solid rgba(255, 0, 0, 0.05);
            box-sizing: border-box;
        }

        .header-system {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            letter-spacing: 15px;
            text-shadow: 0 0 20px var(--main-color);
            border-bottom: 2px solid var(--main-color);
            padding-bottom: 10px;
        }

        .status-text {
            color: var(--main-color);
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* لوحة الأزرار */
        .nav-panel {
            display: grid;
            grid-template-columns: repeat(2, 250px);
            gap: 20px;
        }

        .mil-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--main-color);
            color: white;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .mil-btn:hover {
            background: var(--main-color);
            box-shadow: 0 0 30px var(--glow);
            transform: scale(1.05);
            color: black;
        }

        /* نافذة التقديم (Modal) */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            background: rgba(5, 5, 5, 0.95);
            border: 2px solid var(--main-color);
            padding: 30px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        .modal h2 { color: var(--main-color); text-align: center; }
        
        input, textarea {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: white;
            margin: 10px 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .close-btn {
            color: white;
            float: left;
            cursor: pointer;
            font-size: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="video-bg"></div>
    <div class="grid-overlay"></div>

    <div class="main-frame">
        <div class="header-system">
            <div id="date-time"></div>
            <h1>MARVEL MILITARY</h1>
            <div class="status-text" id="typewriter"></div>
        </div>

        <div class="nav-panel">
            <button class="mil-btn" onclick="openModal('applyModal')"><i class="fas fa-file-signature"></i> تقديم انضمام</button>
            <button class="mil-btn" onclick="showLaws()"><i class="fas fa-gavel"></i> القوانين</button>
            <button class="mil-btn" onclick="window.location.reload()"><i class="fas fa-sync"></i> تحديث النظام</button>
            <button class="mil-btn" onclick="alert('قريباً...')"><i class="fas fa-users"></i> سجل الرتب</button>
        </div>
    </div>

    <div id="applyModal" class="modal">
        <span class="close-btn" onclick="closeModal('applyModal')">&times;</span>
        <h2><i class="fas fa-shield-alt"></i> طلب التحاق عسكري</h2>
        <input type="text" id="applicantName" placeholder="الاسم العسكري (ثلاثي)">
        <input type="text" id="applicantDiscord" placeholder="معرف الديسكورد (مثال: user#0000)">
        <textarea id="applicantReason" rows="4" placeholder="لماذا تريد الانضمام؟"></textarea>
        <button class="mil-btn" style="width: 100%; clip-path: none;" onclick="submitToFirebase()">إرسال البيانات</button>
    </div>

    <script>
        // --- إعدادات فيربايس (يجب استبدالها ببياناتك) ---
        const firebaseConfig = {
            apiKey: "AIzaSyByXXXXXXXXXXXX", 
            authDomain: "marvel-military.firebaseapp.com",
            projectId: "marvel-military",
            storageBucket: "marvel-military.appspot.com",
            messagingSenderId: "XXXXXXXX",
            appId: "1:XXXXXXX:web:XXXXXX"
        };
        
        // تشغيل فيربايس (يتم تفعيله بعد وضع بياناتك)
        // firebase.initializeApp(firebaseConfig);
        // const db = firebase.firestore();

        // تأثير الكتابة الآلية
        const text = "نظام القيادة العليا مفعل.. بانتظار الأوامر أيها القائد..";
        let index = 0;
        function typeWriter() {
            if (index < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        // وظائف النوافذ
        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        function showLaws() {
            alert("1. طاعة الأوامر العليا.\n2. عدم استخدام السلاح خارج الخدمة.\n3. الالتزام بالزي الرسمي.");
        }

        // إرسال البيانات إلى فيربايس
        function submitToFirebase() {
            const name = document.getElementById('applicantName').value;
            const discord = document.getElementById('applicantDiscord').value;
            const reason = document.getElementById('applicantReason').value;

            if(name && discord) {
                // ملاحظة: الكود أدناه يعمل بعد ربط بياناتك في firebaseConfig
                /*
                db.collection("applications").add({
                    name: name,
                    discord: discord,
                    reason: reason,
                    date: new Date().toLocaleString()
                }).then(() => {
                    alert("تم إرسال طلبك بنجاح!");
                    closeModal('applyModal');
                });
                */
                alert("تم محاكاة الإرسال بنجاح! (تأكد من وضع مفاتيح Firebase في الكود ليعمل فعلياً)");
            } else {
                alert("يرجى ملء البيانات المطلوبة!");
            }
        }

        // إظهار الوقت الحالي
        setInterval(() => {
            const now = new Date();
            document.getElementById('date-time').innerHTML = now.toLocaleString();
        }, 1000);
    </script>
</body>
</html>
