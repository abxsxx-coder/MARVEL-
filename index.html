<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وزارة الدفاع لدولة مارفل</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --army-red: #7a0000; --gold: #c5a059; --black: #050505; --panel: #111111; }
        body { background: var(--black); color: #e0e0e0; font-family: 'Cairo', sans-serif; margin: 0; line-height: 1.6; }
        
        nav { background: #000; padding: 15px; border-bottom: 3px solid var(--army-red); display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        nav button { background: none; color: #fff; border: 1px solid var(--army-red); padding: 10px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        nav button:hover { background: var(--army-red); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(122,0,0,0.4); }

        .section { display: none; padding: 40px 20px; max-width: 1100px; margin: auto; animation: fadeInUp 0.5s ease; }
        .active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-main { text-align: center; padding: 40px 0; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        .header-main h1 { font-size: 2.5rem; color: var(--gold); margin: 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        .card { background: var(--panel); padding: 25px; border-radius: 10px; border-right: 5px solid var(--gold); margin-bottom: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .grid-cars { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .car-item { background: #1a1a1a; padding: 15px; border-radius: 5px; border-left: 3px solid var(--army-red); }
        .car-item h4 { margin: 0 0 10px 0; color: var(--gold); font-size: 1.1rem; }

        .code-box { background: #000; color: #00ff00; padding: 12px; font-family: monospace; border: 1px dashed #444; border-radius: 5px; direction: ltr; text-align: left; margin: 10px 0; display: block; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .gallery img { width: 100%; border-radius: 8px; border: 1px solid #333; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.03); border-color: var(--gold); }

        table { width: 100%; border-collapse: collapse; background: #111; margin-top: 20px; }
        th { background: var(--army-red); color: white; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
        
        .forbidden { border-right: 5px solid #ff0000; background: rgba(255,0,0,0.05); }
    </style>
</head>
