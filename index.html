<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز القيادة | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --army-red: #8b0000; --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; text-align: center; }
        nav { background: #000; padding: 20px; border-bottom: 3px solid var(--army-red); display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; color: white; border: 1px solid var(--army-red); padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .section { display: none; padding: 30px; max-width: 1200px; margin: auto; }
        .active { display: block; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { background: #151515; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        .gallery-item img { width: 100%; border-radius: 5px; transition: 0.3s; }
        .gallery-item img:hover { transform: scale(1.02); border-color: var(--gold); }
        .info-card { background: #111; padding: 20px; border-right: 5px solid var(--army-red); margin-bottom: 20px; text-align: right; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-send { background: var(--army-red); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('apply')">تقديم طلب</button>
    <button onclick="showTab('system')">بوابة النظام العسكري</button>
    <button onclick="checkAdmin()" style="color:var(--gold)">لوحة القادة</button>
</nav>

<div id="apply" class="section active">
    <div style="background:#111; padding:30px; border-radius:10px; max-width:500px; margin:auto;">
        <h2 style="color:var(--army-red)">📩 تسجيل طلب جديد</h2>
        <input type="text" id="name" placeholder="الاسم العسكري">
        <input type="text" id="discord" placeholder="معرف الديسكورد">
        <select id="branch">
            <option>القوات البرية</option>
            <option>القوات الجوية</option>
            <option>الشرطة العسكرية</option>
        </select>
        <button class="btn-send" onclick="sendData()">إرسال الطلب</button>
    </div>
</div>

<div id="system" class="section">
    <h1 style="color:var(--gold)">🎖️ الدليل العسكري والتعميمات</h1>
    
    <div class="info-card">
        <h3>🚗 المركبات والعمليات</h3>
        <p>الموجة: <strong>3</strong> | السناريو: <strong>ارمادا</strong> | القيادة: <strong>جي كلاس</strong></p>
    </div>

    <div class="gallery" id="imageGallery">
        </div>
</div>

<div id="admin" class="section">
    <h2>⚙️ إدارة الطلبات</h2>
    <div id="app_list" style="text-align:right; background:#111; padding:20px;"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function checkAdmin() {
        if(prompt("رمز القادة:") === "LEADER2026") showTab('admin');
    }

    // --- نظام عرض الصور الذكي ---
    const gallery = document.getElementById('imageGallery');
    // القائمة الكاملة للصور التي رفعتها لي
    const myImages = [
        "1.png", "2.png", "3.png", "10.png", "211.png", 
        "12121212.png", "IMG_0618.jpg", "IMG_0619.jpg", "IMG_0620.jpg",
        "33075ca33ac2b20a.png", "image.png", "Screenshot_2024-08-07_060038.png"
    ];

    myImages.forEach(imgName => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `<img src="${imgName}" alt="عسكري" onerror="this.src='${imgName.toUpperCase()}'; this.onerror=function(){this.parentElement.style.display='none'};">`;
        gallery.appendChild(item);
    });

    // محاولة عرض الصور من 4 إلى 19 (في حال سميتها بالأرقام)
    for(let i=4; i<=19; i++) {
        if(i === 10) continue;
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `<img src="${i}.png" onerror="this.src='${i}.PNG'; this.onerror=function(){this.parentElement.style.display='none'};">`;
        gallery.appendChild(item);
    }

    function sendData() {
        const n = document.getElementById('name').value, d = document.getElementById('discord').value;
        if(n && d) db.collection("applications").add({ name: n, discord: d, status: 'انتظار' })
        .then(() => alert("تم الإرسال!"));
    }
</script>
</body>
</html>
