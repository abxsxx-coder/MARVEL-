<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>النظام العسكري المتكامل | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #8b0000; --gold: #d4af37; --bg: #0a0a0a; --card-bg: #151515; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; text-align: center; }
        
        /* التنقل */
        nav { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: center; gap: 10px; sticky: top; }
        nav button { background: none; color: white; border: 1px solid var(--primary); padding: 10px 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button:hover { background: var(--primary); }

        .section { display: none; background: #111; margin: 20px auto; padding: 25px; width: 90%; max-width: 1100px; border-right: 5px solid var(--primary); text-align: right; }
        .active { display: block; }

        /* معرض الصور */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery img { width: 100%; border: 1px solid var(--gold); border-radius: 5px; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); }

        /* الجداول والبيانات */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #000; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: var(--primary); }
        .code-box { background: #000; color: #00ff00; padding: 5px; border: 1px dashed var(--gold); font-family: monospace; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #444; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('apply')">تسجيل طلب جديد</button>
    <button onclick="checkAccess()">بوابة المقبولين</button>
    <button onclick="checkAdminAccess()">لوحة الإدارة (للقادة)</button>
</nav>

<div id="apply" class="section active">
    <h2 style="color:var(--primary)">📩 استمارة طلب الالتحاق العسكري</h2>
    <input type="text" id="name" placeholder="الاسم العسكري الثلاثي">
    <input type="text" id="discord" placeholder="معرف الديسكورد (ID)">
    <select id="branch">
        <option>القوات البرية</option>
        <option>القوات الجوية</option>
        <option>الشرطة العسكرية</option>
    </select>
    <button class="btn-main" onclick="sendData()">إرسال الطلب الرسمي</button>
</div>

<div id="military_system" class="section">
    <h1 style="color:var(--gold)">🎖️ مركز المعلومات والتعميمات</h1>
    
    <div style="background:#1a1a1a; padding:15px; margin-bottom:20px; border-right: 5px solid var(--gold);">
        <h3>📻 البيانات التشغيلية</h3>
        <p>الموجة الخاصة: <span class="gold-text">3</span> | الموقع: <span class="gold-text">مركز وزارة الدفاع</span></p>
        <p>أكواد الملابس (أفراد): <span class="code-box">59316417</span> | (قيادة): <span class="code-box">15981693</span></p>
    </div>

    <h3>📸 معرض التعميمات والبروتوكولات (19 صورة)</h3>
    <div class="gallery">
        <img src="1.png" alt="تعميم 1">
        <img src="2.png" alt="تعميم 2">
        <img src="3.png" alt="تعميم 3">
        <img src="33075ca33ac2b20a.png" alt="بروتوكول الرتب">
        <img src="image.png" alt="التشكيلات">
        <img src="IMG_0619.jpg" alt="لائحة المخالفات">
        <script>
            // كود لإضافة بقية الصور تلقائياً إذا كانت مسمّاة بالأرقام
            for(let i=4; i<=19; i++) {
                document.write(`<img src="${i}.png" alt="صورة ${i}" onerror="this.style.display='none'">`);
            }
        </script>
    </div>
</div>

<div id="admin_panel" class="section">
    <h2 style="color:var(--gold)">⚙️ لوحة تحكم القادة</h2>
    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الديسكورد</th>
                <th>الحالة</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="app_list">
            </tbody>
    </table>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'admin_panel') loadApps();
    }

    function checkAccess() {
        const p = prompt("أدخل رمز الوصول العسكري:");
        if(p === "MARVEL2026") showTab('military_system');
        else alert("رمز خاطئ!");
    }

    function checkAdminAccess() {
        const p = prompt("رمز القادة السري:");
        if(p === "LEADER2026") showTab('admin_panel');
        else alert("غير مصرح لك!");
    }

    function sendData() {
        const n = document.getElementById('name').value;
        const d = document.getElementById('discord').value;
        if(n && d) {
            db.collection("applications").add({
                military_name: n, discord_id: d, status: 'قيد الانتظار', timestamp: new Date().toLocaleString()
            }).then(() => { alert("تم الإرسال!"); location.reload(); });
        }
    }

    function loadApps() {
        const list = document.getElementById('app_list');
        list.innerHTML = "";
        db.collection("applications").orderBy("timestamp", "desc").get().then(snap => {
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <tr>
                        <td>${data.military_name}</td>
                        <td>${data.discord_id}</td>
                        <td>${data.status}</td>
                        <td>
                            <button onclick="update('${doc.id}', 'مقبول ✅')" style="background:green; color:white;">قبول</button>
                            <button onclick="update('${doc.id}', 'مرفوض ❌')" style="background:red; color:white;">رفض</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function update(id, s) {
        db.collection("applications").doc(id).update({status: s}).then(() => loadApps());
    }
</script>
</body>
</html>
