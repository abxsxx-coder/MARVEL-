<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة القوات المسلحة | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #ff0000; --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; text-align: center; }
        .hero { padding: 40px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)); border-bottom: 3px solid var(--primary); }
        .section { background: #111; margin: 20px auto; padding: 25px; width: 90%; max-width: 800px; border-right: 5px solid var(--primary); text-align: right; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .protocol-img { width: 100%; border: 1px solid var(--gold); margin: 15px 0; border-radius: 5px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #b30000; box-shadow: 0 0 20px var(--primary); }
    </style>
</head>
<body>

<div class="hero">
    <h1 style="font-size: 2.5rem; margin: 0;">MARVEL MILITARY</h1>
    <p style="color: var(--gold); font-weight: bold;">بوابة الانضمام للقوات المسلحة</p>
</div>

<div class="section">
    <h2>📜 الأنظمة العسكرية</h2>
    <p>• الالتزام التام بالرتب العسكرية والمناداة الرسمية.</p>
    <p>• التواجد الدائم في راديو العمليات (المدينة والديسكورد).</p>
    <p>• تمثيل الشخصية العسكرية بأفضل صورة ممكنة.</p>
</div>

<div class="section">
    <h2>🎖️ بروتوكول مناداة الرتب</h2>
    <img src="image_d819d0.png" class="protocol-img" alt="بروتوكول الرتب">
</div>

<div class="section" id="formContainer">
    <h2>📩 طلب التحاق عسكري</h2>
    <input type="text" id="name" placeholder="الاسم العسكري الثلاثي">
    <input type="text" id="discord" placeholder="معرف الديسكورد (ID)">
    <select id="branch">
        <option>القوات البرية</option>
        <option>القوات الجوية</option>
        <option>إدارة الشرطة العسكرية</option>
    </select>
    <textarea id="reason" rows="3" placeholder="لماذا ترغب في الانضمام؟"></textarea>
    <button class="btn" onclick="sendData()">إرسال الطلب للقيادة العليا</button>
</div>

<script>
    // بيانات Firebase الخاصة بك المستخرجة من صورتك
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        messagingSenderId: "477826729291",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce",
        measurementId: "G-3BKT9RXH6E"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function sendData() {
        const name = document.getElementById('name').value;
        const discord = document.getElementById('discord').value;
        const branch = document.getElementById('branch').value;
        const reason = document.getElementById('reason').value;

        if(name && discord) {
            db.collection("applications").add({
                military_name: name,
                discord_id: discord,
                division: branch,
                statement: reason,
                timestamp: new Date().toLocaleString()
            })
            .then(() => {
                alert("تم إرسال طلبك بنجاح! سيتم مراجعته من القيادة.");
                document.getElementById('formContainer').innerHTML = "<h3 style='text-align:center; color:var(--gold);'>تم استلام الطلب، بانتظار قرار القيادة.</h3>";
            })
            .catch((e) => {
                console.error(e);
                alert("تأكد من تفعيل Firestore في Firebase (Test Mode).");
            });
        } else {
            alert("يرجى إكمال الحقول الأساسية.");
        }
    }
</script>

</body>
</html>
