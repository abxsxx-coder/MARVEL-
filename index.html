<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة وزارة الدفاع | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --army-red: #8b0000; --gold: #d4af37; --dark: #0a0a0a; --card: #151515; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; padding: 0; }
        
        /* الهيدر */
        nav { background: #000; padding: 20px; border-bottom: 3px solid var(--army-red); display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; color: white; border: 1px solid var(--army-red); padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        nav button:hover { background: var(--army-red); box-shadow: 0 0 10px var(--army-red); }

        .section { display: none; padding: 40px 20px; max-width: 1200px; margin: auto; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الكروت والمعلومات */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card); padding: 20px; border-right: 5px solid var(--army-red); border-radius: 5px; text-align: right; }
        .card h3 { color: var(--gold); margin-top: 0; }

        /* معرض الصور (المكان اللي تظهر فيه الـ 19 صورة) */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .gallery-item { background: #1a1a1a; padding: 10px; border: 1px solid #333; border-radius: 8px; transition: 0.3s; }
        .gallery-item:hover { border-color: var(--gold); transform: translateY(-5px); }
        .gallery-item img { width: 100%; height: auto; border-radius: 5px; display: block; }

        /* نموذج التسجيل */
        .reg-box { background: var(--card); padding: 30px; border-radius: 10px; max-width: 500px; margin: auto; border-top: 5px solid var(--army-red); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: var(--army-red); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; border-radius: 5px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('apply')">تقديم الطلب</button>
    <button onclick="checkAccess()">بوابة المقبولين</button>
    <button onclick="checkAdminAccess()" style="color:var(--gold)">لوحة القادة</button>
</nav>

<div id="apply" class="section active">
    <div class="reg-box">
        <h2 style="color:var(--army-red)">🎖️ التسجيل العسكري</h2>
        <input type="text" id="name" placeholder="الاسم العسكري">
        <input type="text" id="discord" placeholder="ID الديسكورد">
        <select id="branch">
            <option>القوات البرية</option>
            <option>القوات الجوية</option>
            <option>الشرطة العسكرية</option>
        </select>
        <button class="btn-submit" onclick="sendData()">إرسال الطلب</button>
    </div>
</div>

<div id="military_system" class="section">
    <h1 style="color:var(--gold); text-align:center">🎖️ الأكاديمية العسكرية - التعميمات</h1>
    
    <div class="info-grid">
        <div class="card">
            <h3>📻 الاتصالات</h3>
            <p>الموجة العسكرية: <strong>3</strong></p>
            <p>الموقع: مركز وزارة الدفاع</p>
        </div>
        <div class="card">
            <h3>🚗 المركبات</h3>
            <p>السيناريو: <strong>ارمادا</strong> | القيادة: <strong>جي كلاس</strong></p>
        </div>
        <div class="card">
            <h3>👕 الأكواد</h3>
            <p>أفراد: <code>59316417</code> | قيادة: <code>15981693</code></p>
        </div>
    </div>

    <div class="gallery" id="armyGallery">
        </div>
</div>

<script>
    // تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function checkAccess() {
        if(prompt("أدخل الرمز العسكري:") === "MARVEL2026") showTab('military_system');
    }

    // عرض الـ 19 صورة من GitHub تلقائياً
    const gallery = document.getElementById('armyGallery');
    const images = ["33075ca33ac2b20a.png", "image.png", "IMG_0618.jpg", "IMG_0619.jpg", "IMG_0620.jpg", "211.png", "10.png", "12121212.png", "1.png", "2.png", "3.png"];
    
    // إضافة الصور المحددة
    images.forEach(img => {
        gallery.innerHTML += `<div class="gallery-item"><img src="${img}" onerror="this.parentElement.style.display='none'"></div>`;
    });

    // محاولة إضافة بقية الصور من 4 إلى 19
    for(let i=4; i<=19; i++) {
        gallery.innerHTML += `<div class="gallery-item"><img src="${i}.png" onerror="this.parentElement.style.display='none'"></div>`;
    }

    function sendData() {
        const n = document.getElementById('name').value, d = document.getElementById('discord').value;
        if(n && d) db.collection("applications").add({ name: n, discord: d, time: new Date().toLocaleString() })
        .then(() => { alert("تم الإرسال!"); location.reload(); });
    }
</script>
</body>
</html>
