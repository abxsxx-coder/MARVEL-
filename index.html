<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الإدارة العسكرية | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #ff0000; --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; text-align: center; }
        nav { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); }
        nav button { background: none; color: white; border: 1px solid var(--primary); padding: 10px 20px; cursor: pointer; margin: 0 5px; font-weight: bold; }
        .section { display: none; background: #111; margin: 20px auto; padding: 25px; width: 90%; max-width: 800px; border-right: 5px solid var(--primary); text-align: right; }
        .active { display: block; }
        .protocol-img { width: 100%; max-width: 600px; border: 1px solid var(--gold); margin: 15px auto; display: block; }
        .access-box { background: #222; padding: 20px; border: 1px solid var(--gold); border-radius: 8px; margin-top: 20px; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #000; color: white; border: 1px solid #444; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('apply')">تقديم طلب</button>
    <button onclick="checkAccess()">بوابة المقبولين والتعميمات</button>
</nav>

<div id="apply" class="section active">
    <h2 style="color:var(--primary)">📩 تقديم التحاق جديد</h2>
    <input type="text" id="name" placeholder="الاسم العسكري">
    <input type="text" id="discord" placeholder="ID الديسكورد">
    <button class="btn" onclick="sendData()">إرسال الطلب</button>
</div>

<div id="login_gate" class="section">
    <div class="access-box">
        <h3>🔒 منطقة عسكرية محظورة</h3>
        <p>الرجاء إدخال رمز الدخول العسكري لعرض التعميمات</p>
        <input type="password" id="mil_pass" placeholder="أدخل الرمز هنا">
        <button class="btn" onclick="verifyPass()">دخول</button>
    </div>
</div>

<div id="military_system" class="section">
    <h2 style="color:var(--gold)">📜 التعميمات والبروتوكولات الرسمية</h2>
    <img src="12121212.png" class="protocol-img">
    <div style="background:#000; padding:15px; border:1px solid #333;">
        <p>📌 تعميم رقم (1): الالتزام بالتحية العسكرية (bind keyboard 0 "e airforce04").</p>
        <p>📌 تعميم رقم (2): يمنع التواجد في المنطقة المحظورة بدون إذن رسمي.</p>
    </div>
</div>

<script>
    // بيانات Firebase الخاصة بمشروعك
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    function checkAccess() {
        showTab('login_gate');
    }

    function verifyPass() {
        const pass = document.getElementById('mil_pass').value;
        // يمكنك تغيير "1234" إلى أي رمز سري تريده
        if(pass === "MARVEL2026") { 
            showTab('military_system');
        } else {
            alert("عذراً، الرمز خاطئ. التسلل للمنطقة العسكرية يعرضك للمساءلة!");
        }
    }

    function sendData() {
        const n = document.getElementById('name').value;
        const d = document.getElementById('discord').value;
        if(n && d) {
            db.collection("applications").add({
                military_name: n, discord_id: d, timestamp: new Date().toLocaleString()
            }).then(() => alert("تم الإرسال! انتظر الرد عبر الديسكورد."));
        }
    }
</script>
</body>
</html>
