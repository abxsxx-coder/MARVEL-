<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة القوات المسلحة | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #ff0000; --gold: #d4af37; --bg: #050505; --success: #28a745; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; text-align: center; }
        nav { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: none; color: white; border: 1px solid var(--primary); padding: 10px 15px; cursor: pointer; font-weight: bold; }
        .section { display: none; background: #111; margin: 20px auto; padding: 25px; width: 90%; max-width: 1000px; border-right: 5px solid var(--primary); text-align: right; }
        .active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #000; color: white; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: var(--primary); }
        .protocol-img { width: 100%; max-width: 600px; border: 1px solid var(--gold); margin: 20px auto; display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #444; }
        .btn-action { padding: 5px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('apply')">تقديم طلب</button>
    <button onclick="showTab('rules')">القوانين والبروتوكولات</button>
    <button onclick="checkAdminAccess()" style="border-color: var(--gold); color: var(--gold);">لوحة التحكم (للقادة)</button>
</nav>

<div id="apply" class="section active">
    <h2>📩 تقديم طلب انضمام عسكري</h2>
    <input type="text" id="name" placeholder="الاسم العسكري الثلاثي">
    <input type="text" id="discord" placeholder="معرف الديسكورد">
    <select id="branch">
        <option>القوات البرية</option>
        <option>القوات الجوية</option>
        <option>الشرطة العسكرية</option>
    </select>
    <button onclick="sendData()" style="background:var(--primary); color:white; width:100%; padding:15px; border:none; font-weight:bold; cursor:pointer;">إرسال الطلب الرسمي</button>
</div>

<div id="rules" class="section">
    <h2 style="color:var(--gold)">📜 البروتوكولات العسكرية</h2>
    <img src="salute.png" class="protocol-img" alt="بروتوكول الرتب">
    <div style="background:#000; padding:15px; border-left: 4px solid var(--gold);">
        <p>⚠️ تعميم: يجب حفظ رتب المناداة الموضحة في الصورة أعلاه قبل دخول المقابلة.</p>
    </div>
</div>

<div id="admin_panel" class="section">
    <h2 style="color:var(--gold)">⚙️ إدارة شؤون الأفراد والقبول</h2>
    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>القطاع</th>
                <th>الحالة</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody id="applications_list">
            </tbody>
    </table>
</div>

<script>
    // إعدادات Firebase الخاصة بك Marvel-Military
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'admin_panel') loadApplications();
    }

    // الدخول للوحة التحكم برمز سري
    function checkAdminAccess() {
        const pass = prompt("أدخل رمز دخول القادة:");
        if(pass === "MARVEL2026") {
            showTab('admin_panel');
        } else {
            alert("دخول غير مصرح!");
        }
    }

    function sendData() {
        const n = document.getElementById('name').value;
        const d = document.getElementById('discord').value;
        const b = document.getElementById('branch').value;
        if(n && d) {
            db.collection("applications").add({
                military_name: n, discord_id: d, division: b, status: 'pending', timestamp: new Date().toLocaleString()
            }).then(() => {
                alert("تم إرسال طلبك! سيتم الرد عليك قريباً.");
                location.reload();
            });
        }
    }

    function loadApplications() {
        const list = document.getElementById('applications_list');
        list.innerHTML = "<tr><td colspan='4'>جاري جلب بيانات المتطوعين...</td></tr>";
        
        db.collection("applications").orderBy("timestamp", "desc").get().then((querySnapshot) => {
            list.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <tr>
                        <td>${data.military_name}</td>
                        <td>${data.division}</td>
                        <td>${data.status}</td>
                        <td>
                            <button class="btn-action" style="background:var(--success)" onclick="updateStatus('${doc.id}', 'مقبول ✅')">قبول</button>
                            <button class="btn-action" style="background:var(--primary)" onclick="updateStatus('${doc.id}', 'مرفوض ❌')">رفض</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function updateStatus(id, stat) {
        db.collection("applications").doc(id).update({ status: stat }).then(() => {
            alert("تم تحديث حالة الطلب");
            loadApplications();
        });
    }
</script>
</body>
</html>
