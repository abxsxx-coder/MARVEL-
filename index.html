<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة القوات المسلحة | MARVEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #ff0000; --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma; margin: 0; text-align: center; }
        nav { background: #111; padding: 15px; border-bottom: 2px solid var(--primary); }
        nav button { background: none; color: white; border: 1px solid var(--primary); padding: 10px 20px; cursor: pointer; margin: 0 5px; }
        .hero { padding: 30px; background: #000; }
        .section { display: none; background: #111; margin: 20px auto; padding: 25px; width: 90%; max-width: 800px; border-right: 5px solid var(--primary); text-align: right; }
        .active { display: block; }
        .protocol-img { width: 100%; border: 1px solid var(--gold); margin: 15px 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #444; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('apply')">تقديم طلب انضمام</button>
    <button onclick="showTab('rules')">القوانين والبروتوكولات</button>
</nav>

<div id="apply" class="section active">
    <h2>📩 طلب التحاق عسكري</h2>
    <input type="text" id="name" placeholder="الاسم العسكري الثلاثي">
    <input type="text" id="discord" placeholder="معرف الديسكورد">
    <select id="branch">
        <option>القوات البرية</option>
        <option>القوات الجوية</option>
        <option>الشرطة العسكرية</option>
    </select>
    <button class="btn" onclick="sendData()">إرسال الطلب</button>
</div>

<div id="rules" class="section">
    <h2>📜 القوانين العامة</h2>
    <ul>
        <li>يمنع منعاً باتاً الخروج عن النص العسكري أثناء الدوام.</li>
        <li>الالتزام بالراديو والترددات المحددة لكل قطاع.</li>
        <li>احترام الرتب الأعلى والتقيد ببروتوكول المناداة.</li>
    </ul>
    
    <h2>🎖️ بروتوكول مناداة الرتب</h2>
    <img src="image_d819d0.png" class="protocol-img" alt="بروتوكول الرتب">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBWB-zYDHuYlQ2afaxKuOXlWKI7xAgjmTw",
        authDomain: "marvel-military.firebaseapp.com",
        projectId: "marvel-military",
        storageBucket: "marvel-military.firebasestorage.app",
        messagingSenderId: "477826729291",
        appId: "1:477826729291:web:95909db6cb7ba511fd94ce",
        measurementId: "G-3BKT9RXH6E"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }

    function sendData() {
        const n = document.getElementById('name').value;
        const d = document.getElementById('discord').value;
        const b = document.getElementById('branch').value;
        if(n && d) {
            db.collection("applications").add({
                name: n, discord: d, branch: b, date: new Date().toLocaleString()
            }).then(() => alert("تم الإرسال! يمكنك الآن الانتقال لصفحة القوانين للقراءة."));
        }
    }
</script>
</body>
</html>
